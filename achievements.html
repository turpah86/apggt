<div id="achievements-container" class="achievements-grid">
    <div class="loading" style="color: white; text-align: center; width: 100%;">Загрузка твоих побед...</div>
</div>

<style>
    :root { --gold: #ffd700; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
    
    .achievements-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
        padding: 20px;
    }

    .achievement-card {
        background: var(--glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
    }

    .achievement-card:hover {
        transform: translateY(-10px);
        border-color: var(--gold);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .achievement-card img {
        width: 100%;
        height: 200px;
        object-fit: cover; /* Чтобы все картинки были ровными */
        border-radius: 12px;
        margin-bottom: 15px;
    }

    .achievement-card h3 {
        color: white;
        font-size: 1.1rem;
        margin: 0;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
</style>

<script>
async function loadAchievements() {
    // Твоя проверенная ссылка
    const pubLink = 'https://yandex.ru'; 
    const apiURL = `https://yandex.net{encodeURIComponent(pubLink)}&limit=50`;

    const container = document.getElementById('achievements-container');

    try {
        const response = await fetch(apiURL);
        const data = await response.json();
        
        if (!data._embedded) return;

        const items = data._embedded.items;
        container.innerHTML = ''; 

        items.forEach(item => {
            // Берем только картинки
            if (item.mime_type && item.mime_type.includes('image')) {
                const card = document.createElement('div');
                card.className = 'achievement-card';
                
                // Делаем превью качественнее
                const highResPreview = item.preview.replace('size=S', 'size=600x');

                card.innerHTML = `
                    <div onclick="window.open('${item.file}', '_blank')">
                        <img src="${highResPreview}" alt="${item.name}">
                        <h3>${item.name.replace(/\.[^/.]+$/, "")}</h3>
                    </div>
                `;
                container.appendChild(card);
            }
        });
    } catch (e) {
        container.innerHTML = '<p style="color:red">Не удалось загрузить данные с Диска</p>';
        console.error(e);
    }
}

document.addEventListener('DOMContentLoaded', loadAchievements);
</script>
