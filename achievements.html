<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛏️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Достижения | Пермяков А.Н.</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .achievements-page {
            padding-top: 120px;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .achievement-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: 0.4s;
            cursor: pointer;
        }

        .achievement-item:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .img-frame {
            width: 100%;
            height: 220px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .img-frame img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .info-overlay h3 {
            font-size: 0.9rem;
            color: #fff;
            margin: 0;
            font-weight: 400;
            line-height: 1.4;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #ffd700;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255,215,0,0.3);
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,215,0,0.1);
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <nav class="glass-nav">
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="logo-ggt.png" alt="Логотип ГГТ" class="nav-logo-img">
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="students.html">Для студентов</a>
            <a href="achievements.html">Достижения</a>
        </div>
    </nav>


    <div class="achievements-page">
        <header class="page-header">
            <a href="index.html" class="back-btn">← На главную</a>
            <h1>Все достижения</h1>
            <p style="opacity: 0.6;">Архив профессиональных наград и сертификатов</p>
        </header>

        <div id="gallery" class="masonry-grid">
            <div style="color: white; opacity: 0.5; grid-column: 1/-1; text-align: center; padding: 50px;">
                Загрузка архива...
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 60px; opacity: 0.4; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05);">
        © 2024 ПЕРМЯКОВ А.Н. | ГБПОУ ГГТ
    </footer>

    <script>
    async function loadFullGallery() {
        const user = 'turpah86';
        const repo = 'apggt';
        const folder = 'img';
        const container = document.getElementById('gallery');
    
        try {
            const response = await fetch(`https://github.com{user}/${repo}/contents/${folder}`);
            const files = await response.json();
            
            if (Array.isArray(files)) {
                container.innerHTML = '';
                
                // Фильтруем и выводим всё
                files.filter(f => f.name.match(/\.(jpg|jpeg|png|webp)$/i)).forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'achievement-card'; 
                    
                    const displayName = file.name.replace('top_', '').replace(/\.[^/.]+$/, "").replace(/_/g, " ").replace(/image/g, "Достижение ");
    
                    card.onclick = () => {
                        const lb = document.getElementById('lightbox');
                        const lbImg = document.getElementById('lightbox-img');
                        lbImg.src = file.download_url;
                        lb.style.display = 'flex';
                    };
    
                    card.innerHTML = `
                        <div class="img-frame">
                            <img src="${file.download_url}" loading="lazy" style="width:100%; height:100%; object-fit:contain;">
                        </div>
                        <p style="color:white; font-size:0.8rem; margin-top:10px; text-align:center;">${displayName}</p>
                    `;
                    container.appendChild(card);
                });
            }
        } catch (e) {
            container.innerHTML = '<p style="color:white; opacity:0.5; text-align:center; grid-column: 1/-1;">Ошибка обновления списка</p>';
        }
    }
    document.addEventListener('DOMContentLoaded', loadFullGallery);
    </script>
    <div id="lightbox" onclick="this.style.display='none'" style="display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); cursor: zoom-out; align-items: center; justify-content: center;">
        <img id="lightbox-img" src="" style="max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5);">
        <div style="position: absolute; bottom: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem;">Нажмите в любое место, чтобы закрыть</div>
    </div>
</body>
</html>
