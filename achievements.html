<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="https://unpkg.com/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />
    <script src="https://unpkg.com/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛏️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Достижения | Пермяков А.Н.</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .achievements-page {
            padding-top: 120px;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .masonry-grid {
            display: flex !important; /* !important заставит браузер выбрать этот стиль */
            flex-wrap: wrap !important;
            justify-content: center;
            gap: 50px;
            padding: 40px 20px;
            perspective: 2000px;
        }

        .achievement-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: 0.4s;
            cursor: pointer;
        }

        .achievement-item:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .img-frame {
            width: 100%;
            height: 220px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .img-frame img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .info-overlay h3 {
            font-size: 0.9rem;
            color: #fff;
            margin: 0;
            font-weight: 400;
            line-height: 1.4;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #ffd700;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255,215,0,0.3);
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,215,0,0.1);
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <nav class="glass-nav">
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="logo-ggt.png" alt="Логотип ГГТ" class="nav-logo-img">
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="students.html">Для студентов</a>
            <a href="achievements.html">Достижения</a>
        </div>
    </nav>


    <div class="achievements-page">
        <header class="page-header">
            <a href="index.html" class="back-btn">← На главную</a>
            <h1>Все достижения</h1>
            <p style="opacity: 0.6;">Архив профессиональных наград и сертификатов</p>
        </header>

        <div id="gallery" class="masonry-grid">
            <div style="color: white; opacity: 0.5; grid-column: 1/-1; text-align: center; padding: 50px;">
                Загрузка архива...
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 60px; opacity: 0.4; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05);">
        © 2026 ПЕРМЯКОВ А.Н. | ГБПОУ РС(Я) ГГТ
    </footer>
    <script>
        const folderUrl = 'https://api.github.com/repos/turpah86/apggt/contents/img';
        function loadAchievements() {
            const container = document.getElementById('gallery');
            if (!container) return;
    
            fetch(folderUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Ошибка API');
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = ''; 
    
                    data.forEach(file => {
                        const isImage = file.name.toLowerCase().match(/\.(jpg|jpeg|png|gif|svg)$/);
                        
                        if (isImage) {
                            const displayName = file.name.split('.')[0];
                            
                            // МАГИЯ ТУТ: Создаем случайный угол от -10 до +10 градусов
                            const randomRotate = Math.floor(Math.random() * 21) - 10;
                            
                            const imgCard = `
                                <div class="achievement-item fadeInUp" style="transform: rotate(${randomRotate}deg);">
                                    <a href="img/${file.name}" data-fancybox="gallery" data-caption="${displayName}">
                                        <div class="img-frame">
                                            <img src="img/${file.name}" alt="${displayName}" loading="lazy">
                                        </div>
                                    </a>
                                    <div class="info-overlay">
                                        <h3>${displayName}</h3>
                                    </div>
                                </div>
                            `;
                            container.insertAdjacentHTML('beforeend', imgCard);
                        }
                    });
    
                    // Включаем Fancybox после загрузки всех фото
                    Fancybox.bind("[data-fancybox]", { infinite: true });
    
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    container.innerHTML = `<p style="color: #ff4d4d; grid-column: 1/-1;">⚠️ Ошибка загрузки архива.</p>`;
                });
        }
    
        document.addEventListener('DOMContentLoaded', loadAchievements);
    </script>
</body>
</html>
