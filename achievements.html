<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="https://unpkg.com/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />
    <script src="https://unpkg.com/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛏️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Достижения | Пермяков А.Н.</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .achievements-page {
            padding-top: 120px;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .masonry-grid {
            display: flex !important;
            flex-wrap: wrap !important;
            justify-content: center !important;
            align-items: flex-start !important;
            gap: 60px;
            padding: 60px 20px;
            perspective: 2000px;
        }
        .achievement-item {
            background: #ffffff; /* Белая бумага фото */
            padding: 10px 10px 40px 10px; /* Поля как у реального фото */
            border-radius: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            width: 280px; /* Фиксируем размер, чтобы они "рассыпались" */
            margin: -5px; /* Легкое наслоение для эффекта кучи */
            position: relative;
        }

        .achievement-item:hover {
            /* !important здесь критичен, чтобы перебить transform из JS */
            transform: scale(1.15) rotate(0deg) translateY(-20px) !important;
            z-index: 100;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            border-color: transparent;
            background: #ffffff;
        }

        .img-frame {
            width: 100%;
            height: 200px;
            background: #222;
            border-radius: 0; /* У фото прямые углы */
            overflow: hidden;
            display: block;
            margin-bottom: 10px;
        }

        .img-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Чтобы все фото были одинаковыми в рамках */
        }

        .info-overlay h3 {
            font-size: 1.1rem;
            color: #1a1a1a; /* Темный текст на белом фоне */
            font-family: 'Brush Script MT', cursive, sans-serif;
            margin: 0;
            font-weight: 500;
            text-align: center;
        }


        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #ffd700;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255,215,0,0.3);
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,215,0,0.1);
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <nav class="glass-nav">
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="logo-ggt.png" alt="Логотип ГГТ" class="nav-logo-img">
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="students.html">Для студентов</a>
            <a href="achievements.html">Достижения</a>
        </div>
    </nav>


    <div class="achievements-page">
        <header class="page-header">
            <a href="index.html" class="back-btn">← На главную</a>
            <h1>Все достижения</h1>
            <p style="opacity: 0.6;">Архив профессиональных наград и сертификатов</p>
        </header>

        <div id="gallery" class="masonry-grid">
            <div style="color: white; opacity: 0.5; grid-column: 1/-1; text-align: center; padding: 50px;">
                Загрузка архива...
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 60px; opacity: 0.4; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05);">
        © 2026 ПЕРМЯКОВ А.Н. | ГБПОУ РС(Я) ГГТ
    </footer>
    <script>
        const folderUrl = 'https://api.github.com/repos/turpah86/apggt/contents/img';
        function loadAchievements() {
            const container = document.getElementById('gallery');
            if (!container) return;
    
            fetch(folderUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Ошибка API');
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = ''; 
    
                    data.forEach(file => {
                        const isImage = file.name.toLowerCase().match(/\.(jpg|jpeg|png|gif|svg)$/);
                        
                        if (isImage) {
                            const displayName = file.name.split('.')[0];                           
                            // 1. Случайный поворот (от -10 до +10 градусов)
                            const randomRotate = Math.floor(Math.random() * 21) - 10;    
                            // 2. Случайное смещение по вертикали (от -30 до +30 пикселей)
                            const randomY = Math.floor(Math.random() * 61) - 30;    
                            // 3. Случайное смещение по горизонтали (от -20 до +20 пикселей)
                            const randomX = Math.floor(Math.random() * 41) - 20;
                            const imgCard = `
                                <div class="achievement-item fadeInUp" 
                                     style="transform: rotate(${randomRotate}deg) translate(${randomX}px, ${randomY}px); margin: 15px;">
                                    <a href="img/${file.name}" data-fancybox="gallery" data-caption="${displayName}">
                                        <div class="img-frame">
                                            <img src="img/${file.name}" alt="${displayName}" loading="lazy">
                                        </div>
                                    </a>
                                    <div class="info-overlay">
                                        <h3>${displayName}</h3>
                                    </div>
                                </div>
                            `;

                            container.insertAdjacentHTML('beforeend', imgCard);
                        }
                    });
    
                    // Включаем Fancybox после загрузки всех фото
                    Fancybox.bind("[data-fancybox]", { infinite: true });
    
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    container.innerHTML = `<p style="color: #ff4d4d; grid-column: 1/-1;">⚠️ Ошибка загрузки архива.</p>`;
                });
        }
    
        document.addEventListener('DOMContentLoaded', loadAchievements);
    </script>
</body>
</html>
