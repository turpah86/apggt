<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Достижения | Пермяков А.Н.</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .achievements-page {
            padding-top: 120px;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .achievement-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: 0.4s;
            cursor: pointer;
        }

        .achievement-item:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .img-frame {
            width: 100%;
            height: 220px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .img-frame img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .info-overlay h3 {
            font-size: 0.9rem;
            color: #fff;
            margin: 0;
            font-weight: 400;
            line-height: 1.4;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #ffd700;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255,215,0,0.3);
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,215,0,0.1);
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <nav class="glass-nav">
        <div class="logo">P.A.N.</div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="students.html">Обучение</a>
            <a href="achievements.html">Достижения</a>
        </div>
    </nav>

    <div class="achievements-page">
        <header class="page-header">
            <a href="index.html" class="back-btn">← На главную</a>
            <h1>Все достижения</h1>
            <p style="opacity: 0.6;">Архив профессиональных наград и сертификатов</p>
        </header>

        <div id="gallery" class="masonry-grid">
            <div style="color: white; opacity: 0.5; grid-column: 1/-1; text-align: center; padding: 50px;">
                Загрузка архива...
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 60px; opacity: 0.4; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05);">
        © 2024 ПЕРМЯКОВ А.Н. | ГБПОУ ГГТ
    </footer>

    <script>
    async function loadGallery() {
        // !!! ТВОЯ ССЫЛКА /exec !!!
        const scriptURL = 'https://script.google.com/macros/s/AKfycbynQTuEFS8ED5hr7NaiqniWQUmBOYpSpV1uEVcBYipTU-yrcb5t9AfCqGB5aEqu7J3p/exec';
        const container = document.getElementById('gallery');

        try {
            // Запрашиваем до 50 файлов
            const response = await fetch(scriptURL + "?limit=50");
            const data = await response.json();
            
            if (data._embedded && data._embedded.items) {
                const items = data._embedded.items;
                container.innerHTML = '';

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'achievement-card';
                    
                    // Твоя ссылка на картинку (превью)
                    const thumb = item.preview;
                    
                    // ПРИ КЛИКЕ - УВЕЛИЧИВАЕМ
                    card.onclick = (e) => {
                        e.preventDefault();
                        const lb = document.getElementById('lightbox');
                        const lbImg = document.getElementById('lightbox-img');
                        
                        // Подставляем ссылку на картинку в большое окно
                        lbImg.src = thumb; 
                        lb.style.display = 'flex';
                    };
                
                    card.innerHTML = `
                        <div class="img-frame">
                            <img src="${thumb}" referrerpolicy="no-referrer" alt="">
                        </div>
                        <p>${item.name.replace(/\.[^/.]+$/, "")}</p>
                    `;
                    container.appendChild(card);
                });
            }
        } catch (e) {
            container.innerHTML = '<p style="color:white; opacity:0.3; text-align:center; grid-column:1/-1;">Не удалось загрузить архив достижений</p>';
        }
    }

    document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
    <div id="lightbox" onclick="this.style.display='none'" style="display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); cursor: zoom-out; align-items: center; justify-content: center;">
        <img id="lightbox-img" src="" style="max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5);">
        <div style="position: absolute; bottom: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem;">Нажмите в любое место, чтобы закрыть</div>
    </div>
</body>
</html>
