<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Учебный план | ПАН</title>
    <link rel="stylesheet" href="style.css">
    <script src="supabase.js"></script>
    <style>
        .locked { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .lesson-card { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 20px; transition: 0.3s; }
        .discipline-tab { padding: 10px 20px; border-radius: 50px; cursor: pointer; border: 1px solid var(--glass-border); transition: 0.3s; }
        .discipline-tab.active { border-color: var(--gold); background: rgba(255, 215, 0, 0.1); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .status-tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        #quiz-timer { position: fixed; top: 80px; right: 20px; background: var(--gold); color: #000; padding: 10px; border-radius: 8px; font-weight: bold; z-index: 100; display: none; }
    </style>
</head>
<body class="main-centered">
    <div class="background-overlay"></div>
    <div id="quiz-timer">Осталось: 20:00</div>

    <div class="glass-card fadeInUp" style="max-width: 1100px; width: 95%; display: flex; flex-direction: column;">
        <!-- Шапка (Студент и кнопка Назад) -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--glass-border);">
            <button onclick="location.href='index.html'" class="btn-secondary" style="margin: 0; padding: 8px 15px;">🔙 В меню</button>
            <h2 id="student-info" style="font-size: 1rem; opacity: 0.6;">Загрузка...</h2>
        </div>
    
        <!-- ОСНОВНОЙ КОНТЕЙНЕР С ДВУМЯ КОЛОНКАМИ -->
        <div style="display: flex; gap: 30px; align-items: flex-start;">
            
            <!-- ЛЕВАЯ КОЛОНКА: Меню дисциплин -->
            <div id="disciplines-nav" style="width: 250px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0;">
                <!-- Генерируется через JS -->
            </div>
    
            <!-- ПРАВАЯ КОЛОНКА: Контент -->
            <div id="course-content" style="flex-grow: 1; border-left: 1px solid var(--glass-border); padding-left: 30px;">
                <h1 id="disc-title" style="color: var(--gold); text-align: center; margin-bottom: 30px; font-size: 1.5rem;">Выберите дисциплину</h1>
                <div id="course-plan">
                    <!-- Темы или Итоговый тест -->
                </div>
            </div>

            <!-- Окно теста (изначально скрыто) -->
            <div id="quiz-overlay" class="glass-card fadeInUp" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 90%; max-width: 600px; border: 2px solid var(--gold);">
                <div id="quiz-content">
                    <h2 id="q-text" style="margin-bottom: 20px;">Загрузка вопроса...</h2>
                    <div id="options-container"></div>
                    <p id="q-progress" style="margin-top: 20px; opacity: 0.5;"></p>
                </div>
            </div>
            <!-- Затемнение фона -->
            <div id="bg-blur" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 999;"></div>
  
        </div>
    </div>

    <script>
        // 1. КОНФИГУРАЦИЯ УЧЕБНОГО ПЛАНА
        const COURSE_MAP = [
            {
                id: "rem_electro",
                title: "Электротехника",
                themes: [
                    { name: "Основные понятия и закон Ома", link: "https://disk.yandex.ru/i/LHkTfjvHvLUweQ" },
                    { name: "Законы Кирхгофа", link: "https://disk.yandex.ru/i/vt-2nWk6_ExHqw" },
                    { name: "Цепи постоянного тока. Соединение элементов", link: "https://disk.yandex.ru/i/lCFdq0_zaWHqTA" },
                    { name: "Элементы электрических схем и их обозначения", link: "https://disk.yandex.ru/i/NadjwgwSnKwR2Q" },
                    { name: "Элементы электрических схем и их обозначения", link: "https://disk.yandex.ru/i/wwN9wC2uPKO24w" },
                    { name: "Цепи переменного тока. Часть 2 (Реактивное сопротивление)", link: "https://disk.yandex.ru/i/ffdyhvkEfTJClQ" },
                    { name: "Основы безопасности при работе с электрооборудованием", link: "https://disk.yandex.ru/i/kgoLUJ0NNgvaDw" },
                    { name: "Практическая работа, средства защиты и первая помощь", link: "https://disk.yandex.ru/i/kaZi-jfuK25cqw" }
                ]
            },
            {
                id: "rem_tech",
                title: "Технология ремонта",
                themes: [ /* Аналогично 8 тем */ ]
            }
        ];

        const S_URL = 'https://uqekwkidsuargeulwkuw.supabase.co';
        const S_KEY = 'sb_publishable_WefHBfPDA7Fx9ZDRMnZDUA_FfqINH2r';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function init() {
            const login = localStorage.getItem('student_login');
            if (!login) { location.href = 'students.html'; return; }

            const { data: student } = await _supabase.from('students').select('*').eq('login', login).single();
            if (!student) return;

            document.getElementById('student-info').innerText = `Студент: ${student.login}`;
            
            renderNav(student.current_disc || 0);
            renderCurrentPlan(student);
        }

        function renderNav(currentDiscIdx) {
            const nav = document.getElementById('disciplines-nav');
            nav.innerHTML = COURSE_MAP.map((disc, idx) => {
                const isLocked = idx > currentDiscIdx;
                const isDone = idx < currentDiscIdx;
                return `
                    <div class="discipline-tab ${isLocked ? 'locked' : ''} ${idx === currentDiscIdx ? 'active' : ''}">
                        ${isDone ? '🗸' : (isLocked ? '🔒' : '✍️')} ${disc.title}
                    </div>
                `;
            }).join('');
        }

        function renderCurrentPlan(student) {
            const dIdx = student.current_disc || 0;
            const tIdx = student.current_step || 1;
            const disc = COURSE_MAP[dIdx];
            const container = document.getElementById('course-plan');
            
            document.getElementById('disc-title').innerText = disc.title;
            container.innerHTML = '';

            if (tIdx <= 8) {
                // Рендерим 8 тем
                disc.themes.forEach((theme, i) => {
                    const stepNum = i + 1;
                    const isLocked = stepNum > tIdx;
                    const isDone = stepNum < tIdx;

                    container.innerHTML += `
                        <div class="glass-card lesson-card ${isLocked ? 'locked' : ''}">
                            <div>
                                <span class="status-tag" style="color: ${isDone ? '#28a745' : 'var(--gold)'}">
                                    ${isDone ? 'Освоено' : (isLocked ? 'Доступ закрыт' : 'Текущая тема')}
                                </span>
                                <h3>Тема ${stepNum}. ${theme.name}</h3>
                                <a href="${theme.link}" target="_blank" class="gold-link" onclick="startTimer(${stepNum})">Изучить лекцию 📖</a>
                            </div>
                            <button id="test-btn-${stepNum}" class="btn-primary" 
                                onclick="startInlineQuiz('${disc.id}_${stepNum}')"
                                ${isDone ? 'style="background:#28a745" disabled' : 'style="background:#555; opacity:0.6; cursor:not-allowed;" disabled'}>
                                ${isDone ? 'Пройдено' : 'Сдать тест'}
                            </button>
                        </div>
                    `;
                });
            } else {
                // Рендерим блок ИТОГОВОГО ТЕСТА
                container.innerHTML = `
                    <div class="glass-card" style="text-align: center; border: 2px solid var(--gold); padding: 40px;">
                        <h2 style="color: var(--gold);">🏆 Дисциплина изучена!</h2>
                        <p style="margin: 20px 0;">Оценка за этот тест пойдет в <b>ДИПЛОМ</b>. У вас есть 3 быстрых попытки (раз в 30 мин), далее — 1 попытка в сутки.</p>
                        <button onclick="startFinalQuiz('${disc.id}')" class="btn-primary" style="width: 100%;">
                            НАЧАТЬ ИТОГОВУЙ ТЕСТ 🏁
                        </button>
                    </div>
                `;
            }
        }

        // Таймер на 60 секунд для тем
        function startTimer(num) {
            const btn = document.getElementById(`test-btn-${num}`);
            let time = 60;
            btn.style.opacity = "0.5";
            const itv = setInterval(() => {
                btn.innerText = `Изучение... ${time}с`;
                time--;
                if(time < 0) {
                    clearInterval(itv);
                    btn.disabled = false;
                    btn.innerText = "Сдать тест ✍️";
                    btn.style.opacity = "1";
                    btn.style.background = ""; // Убираем серый цвет, возвращается желтый из CSS
                    btn.style.cursor = "pointer";
                    btn.style.boxShadow = "0 0 15px var(--gold)";
                }
            }, 1000);
        }

        async function startFinalQuiz(discId) {
            const login = localStorage.getItem('student_login');
            const { data: st } = await _supabase.from('students').select('*').eq('login', login).single();
        
            if (st.final_attempts >= 3) {
                // Проверка на 1 сутки (86400000 мс)
                const diff = new Date() - new Date(st.last_attempt_time);
                if (diff < 86400000) {
                    const hoursLeft = Math.ceil((86400000 - diff) / 3600000);
                    alert(`Лимит быстрых попыток исчерпан. Следующая попытка через ${hoursLeft} ч.`);
                    return;
                }
            } else {
                // Проверка на 30 минут (1800000 мс) между быстрыми попытками
                const diff = new Date() - new Date(st.last_attempt_time);
                if (diff < 1800000) {
                    alert("Между попытками должно пройти минимум 30 минут.");
                    return;
                }
            }
        
            if(confirm("ВНИМАНИЕ! Эта оценка пойдет в диплом. Начать?")) {
                // Обновляем время попытки и счетчик в базе перед началом
                await _supabase.from('students').update({
                    last_attempt_time: new Date().toISOString(),
                    final_attempts: st.final_attempts + 1
                }).eq('login', login);
        
                location.href = `quiz.html?id=${discId}_final&strict=true`;
            }
        }
        let currentQuestions = [];
        let currentIndex = 0;
        let quizScore = 0;
        let currentQuizId = "";
        
        async function startInlineQuiz(quizId) {
            currentQuizId = quizId;
            // 1. Подгружаем файл скрипта
            const script = document.createElement('script');
            script.src = `quizzes/${quizId}.js`;
            script.onload = () => {
                currentQuestions = questions; // Берём массив из загруженного файла
                currentIndex = 0;
                quizScore = 0;
                document.getElementById('bg-blur').style.display = 'block';
                document.getElementById('quiz-overlay').style.display = 'block';
                showQuestion();
            };
            script.onerror = () => alert("Файл теста не найден!");
            document.head.appendChild(script);
        }
        
        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-progress').innerText = `Вопрос ${currentIndex + 1} из ${currentQuestions.length}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
        
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; // Используй свои стили кнопок
                btn.style.cssText = "display:block; width:100%; margin-bottom:10px; padding:10px; background:rgba(255,255,255,0.1); color:white; border:1px solid var(--gold); border-radius:8px; cursor:pointer;";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, q.a);
                container.appendChild(btn);
            });
        }
        
        function checkAnswer(selected, correct) {
            if (selected === correct) quizScore++;
            currentIndex++;
            
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                finishInlineQuiz();
            }
        }
        
        async function finishInlineQuiz() {
            const percent = Math.round((quizScore / currentQuestions.length) * 100);
            let mark = percent >= 85 ? 5 : percent >= 70 ? 4 : percent >= 50 ? 3 : 2;
        
            if (mark >= 3) {
                // Берем логин из памяти. ВАЖНО: убедись, что при входе ты сохраняешь именно его!
                const login = localStorage.getItem('student_login');
                
                console.log("Пытаюсь обновить прогресс для:", login);
        
                // 1. Сначала проверяем, какой шаг сейчас в базе
                const { data: st, error: fetchError } = await _supabase
                    .from('students')
                    .select('current_step')
                    .eq('login', login)
                    .single();
        
                if (fetchError) {
                    console.error("Ошибка поиска студента:", fetchError);
                    alert("Ошибка: Студент не найден в базе!");
                    return;
                }
        
                const nextStep = st.current_step + 1;
                console.log("Текущий шаг:", st.current_step, "Следующий:", nextStep);
        
                // 2. Обновляем базу
                const { error: updateError } = await _supabase
                    .from('students')
                    .update({ current_step: nextStep })
                    .eq('login', login);
        
                if (updateError) {
                    console.error("Ошибка при обновлении:", updateError);
                    alert("Не удалось сохранить результат в базу!");
                } else {
                    alert(`Тест сдан! Оценка: ${mark}. Открыта следующая тема.`);
                    // Скрываем тест и перезагружаем страницу
                    document.getElementById('quiz-overlay').style.display = 'none';
                    document.getElementById('bg-blur').style.display = 'none';
                    location.reload(); 
                }
            } else {
                alert(`Оценка: ${mark}. Тест не сдан. Изучите лекцию еще раз.`);
                location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
