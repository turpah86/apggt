<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="navbar.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛏️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 10px; width: 100%; text-align: left; transition: 0.3s; }
        .selected { border-color: var(--gold) !important; background: rgba(255,255,255,0.1) !important; }
        #section-screen, #start-screen, #quiz-card, #result-screen { display: none; }
        .progress-bar { height: 4px; background: var(--glass); margin-bottom: 20px; border-radius: 2px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.5s; }
        .btn-section { margin-bottom: 10px; width: 100%; display: block; text-align: center; }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    <main class="main-centered" style="padding-top: 100px;">
        <div id="subject-screen" class="glass-card">
            <h2 class="group-title">Выберите предмет</h2>
            <button onclick="chooseSubject('ogr')" class="btn-primary btn-section">⛏️ Технология ОГР</button>
            <button onclick="chooseSubject('electro')" class="btn-primary btn-section">⚡ Электроснабжение ГП</button>
            <button onclick="location.href='index.html'" class="btn-secondary" style="width:100%; margin-top:10px;">🔙 Назад</button>
        </div>

        <div id="section-screen" class="glass-card">
            <h2 class="group-title">Выберите раздел</h2>
            <button onclick="selectSection(1, event)" class="btn-primary btn-section btn-section-choice">Раздел 1</button>
            <button onclick="selectSection(2, event)" class="btn-primary btn-section btn-section-choice">Раздел 2</button>
            <button onclick="selectSection(3, event)" class="btn-primary btn-section btn-section-choice">Раздел 3</button>
            <button onclick="selectSection(4, event)" class="btn-primary btn-section btn-section-choice">Раздел 4</button>
            <button onclick="selectSection(5, event)" class="btn-primary btn-section btn-section-choice">Раздел 5</button>
            <button onclick="selectSection(6, event)" class="btn-primary btn-section btn-section-choice">Раздел 6</button>
            <button onclick="location.reload()" class="btn-secondary" style="width:100%; margin-top:10px;">🔙 Назад</button>
        </div>

        <div id="start-screen" class="glass-card">
            <h2 class="group-title">Ваши данные</h2>
            <input type="text" id="student-name" class="pass-input" placeholder="Фамилия Имя">
            <button onclick="startQuiz()" class="btn-primary" style="margin-top: 15px; width: 100%;">Начать тест</button>
        </div>
        <div id="quiz-card" class="glass-card" style="max-width: 700px;">
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <h2 id="question-text">...</h2>
            <div id="options-container"></div>
        </div>
        <div id="result-screen" class="glass-card">
            <h2 class="group-title">Результат</h2>
            <p id="res-student-name" style="color: white; opacity: 0.8;"></p>
            <div style="font-size: 6rem; font-weight: 900; color: var(--gold);" id="score-val"></div>
            <p id="score-text" style="color: white; margin-bottom: 20px;"></p>
            <button onclick="location.href='index.html'" class="btn-secondary">На главную</button>
        </div>
    </main>
<script>
    const group = localStorage.getItem('user_group');
    if (!group) { 
        window.location.href = 'students.html'; 
    }
    let currentQuestion = 0; 
    let score = 0; 
    let studentInfo = "";
    let userGroup = group; 
    let currentSubject = ""; 
    let currentSectionName = "";
    const subjectsData = {
        'ogr': {
            name: 'Технология ОГР',
            sections: ['Введение', 'Технология ОГР', 'Подготовка пород', 'Выемочно-погрузочные работы', 'Перемещение грузов', 'Отвалообразование']
        },
        'electro': {
            name: 'Электроснабжение ГП',
            sections: ['Понятие об энергосистеме и электросетями', 'Схемы внешних распределительных сетей', 'Определение электрических нагрузок', 'Линии электроснабжения горного предприятия']
        }
    };
    
    function chooseSubject(subj) {
        currentSubject = subj;
        const buttons = document.querySelectorAll('.btn-section-choice'); 
        const data = subjectsData[subj];
        
        buttons.forEach((btn, index) => {
            if (data.sections[index]) {
                btn.innerText = `Раздел ${index + 1}: ${data.sections[index]}`;
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none'; 
            }
        });
    
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('section-screen').style.display = 'block';
    }
    const quizLimits = {
        'ogr': { 1: 21, 2: 22, 3: 33, 4: 34, 5: 45, 6: 46 },
        'electro': { 1: 15, 2: 15, 3: 15, 4: 24 } 
    };
    function selectSection(num) {
        currentSectionName = event.target.innerText; 
        const quizFileName = `${currentSubject}_razdel${num}`; 
        const script = document.createElement('script');
        script.src = `quizzes/${quizFileName}.js`;
        script.onload = () => {
            questions.sort(() => Math.random() - 0.5);
            const limit = quizLimits[currentSubject][num] || 20; 
            questions.length = Math.min(questions.length, limit);
            document.getElementById('section-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
        };
        script.onerror = () => alert(`Ошибка: Файл ${quizFileName}.js не найден!`);
        document.head.appendChild(script);
    }
    function startQuiz() {
        studentInfo = document.getElementById('student-name').value.trim();
        if (studentInfo.length < 3) return alert("Введите Фамилию и Имя");
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-card').style.display = 'block';
        loadQuestion();
    }
    function loadQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.q;
        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progress-fill').style.width = progress + "%";
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.map((text, index) => ({text, index}))
           .sort(() => Math.random() - 0.5)
           .forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');
                    if(opt.index === q.a) score++;
                    currentQuestion++;
                    if(currentQuestion < questions.length) {
                        loadQuestion();
                    } else {
                        showResults();
                    }
                };
                container.appendChild(btn);
           });
    }
        function showResults() {
            const percent = Math.round((score / questions.length) * 100);
            let mark = percent >= 85 ? 5 : percent >= 70 ? 4 : percent >= 50 ? 3 : 2;
            let comment = "";
            if (mark === 5) {
                comment = "Красавчик! Настоящий горный инженер. 🏆";
            } else if (mark === 4) {
                comment = "Хорошо, но можно и лучше. Почти профи! 😉";
            } else if (mark === 3) {
                comment = "Слабовато... Тройка — не предел, иди полистай лекции. 📚";
            } else {
                comment = "Мда... С таким багажом знаний в карьер лучше не соваться. Иди учись! ⛔";
            }
            const userGroup = localStorage.getItem('user_group') || "Не указана";
        
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score-val').innerText = mark;
            document.getElementById('res-student-name').innerText = studentInfo;
            document.getElementById('score-text').innerText = comment;
        
            // --- ОТПРАВКА В GOOGLE ТАБЛИЦУ ---
            const fURL = 'https://docs.google.com/forms/d/e/1FAIpQLSfiEZoHThkT4Za9B_LJ50TJTSYxuG0DklY9CSiMjq92vKANhA/formResponse';
            const fData = new URLSearchParams();
            fData.append('entry.1458374118', studentInfo); 
            const sName = subjectsData[currentSubject]?.name || currentSubject;
            const uGroup = localStorage.getItem('user_group') || "Группа не указана";
            const fullInfo = `${uGroup.toUpperCase()} | ${sName} | ${currentSectionName}`;
            fData.append('entry.1320096689', fullInfo); 
            fData.append('entry.1906150515', `${percent}% (${score}/${questions.length})`); 
            fData.append('entry.1688940307', mark);
            fetch(fURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: fData.toString()
            }).then(() => {
                console.log("Данные успешно отправлены!");
            }).catch(e => console.error("Ошибка при отправке:", e));
        }
        const isStrict = params.get('strict') === 'true';
        
        if (isStrict) {
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    alert("ПОПЫТКА АННУЛИРОВАНА! Нельзя сворачивать окно или переключать вкладки во время экзамена.");
                    location.href = 'rem_course.html';
                }
            });
        }
        async function finishQuiz() {
            const login = localStorage.getItem('student_login');
            const percent = Math.round((correctAnswersCount / questions.length) * 100);
            
            // Логика расчета оценки
            let grade = 2;
            if (percent >= 90) grade = 5;
            else if (percent >= 75) grade = 4;
            else if (percent >= 60) grade = 3;
        
            const statusText = grade > 2 ? `Пройдено на ${grade}` : "Не сдано";
        
            // Сохраняем результат в Supabase
            // final_grade - нужно добавить такую колонку в таблицу students (тип int4)
            await _supabase.from('students')
                .update({ 
                    final_grade: grade,
                    current_step: 9, // Ставим 9, чтобы в меню отображалось "Завершено"
                    last_attempt_time: new Date().toISOString()
                })
                .eq('login', login);
        
            // Красивый финал
            document.getElementById('quiz-box').innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <h1 style="font-size: 4rem;">${grade === 2 ? '❌' : '🏆'}</h1>
                    <h2>Ваш результат: ${percent}%</h2>
                    <h1 style="color: var(--gold); font-size: 3rem;">Оценка: ${grade}</h1>
                    <p style="margin: 20px 0; opacity: 0.7;">${statusText}</p>
                    <button onclick="location.href='rem_course.html'" class="btn-primary">Вернуться в учебный план</button>
                </div>
            `;
        }

    </script>
</body>
</html>
