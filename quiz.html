<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестирование | P.A.N.</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script>
        const group = localStorage.getItem('user_group');
        if (group && USERS[group]) {
            const script = document.createElement('script');
            script.src = `quizzes/${USERS[group].quiz}.js`;
            document.head.appendChild(script);
        } else { window.location.href = 'students.html'; }
    </script>
    <style>
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 10px; width: 100%; text-align: left; transition: 0.3s; }
        .selected { border-color: var(--gold) !important; background: rgba(255,255,255,0.1) !important; }
        #quiz-card, #result-screen { display: none; }
        .progress-bar { height: 4px; background: var(--glass); margin-bottom: 20px; border-radius: 2px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    <main class="main-centered" style="padding-top: 100px;">
        <div id="start-screen" class="glass-card">
            <h2 class="group-title">Начало теста</h2>
            <input type="text" id="student-name" class="pass-input" placeholder="Фамилия Имя">
            <button onclick="startQuiz()" class="btn-primary" style="margin-top: 15px;">Начать</button>
        </div>

        <div id="quiz-card" class="glass-card" style="max-width: 700px;">
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <h2 id="question-text">...</h2>
            <div id="options-container"></div>
        </div>

        <div id="result-screen" class="glass-card">
            <h2 class="group-title">Результат</h2>
            <!-- Добавил ID для отображения имени, чтобы не было ошибок -->
            <p id="res-student-name" style="color: white; opacity: 0.8;"></p>
            <div style="font-size: 6rem; font-weight: 900; color: var(--gold);" id="score-val"></div>
            <p id="score-text" style="color: white; margin-bottom: 20px;"></p>
            <button onclick="location.href='index.html'" class="btn-secondary">На главную</button>
        </div>
    </main>

    <script>
        let currentQuestion = 0; let score = 0; let studentInfo = "";

        function startQuiz() {
            studentInfo = document.getElementById('student-name').value.trim();
            if (studentInfo.length < 3) return alert("Введите ФИО");
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-card').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-fill').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.o.map((text, index) => ({text, index})).sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');
                    btn.classList.add('selected');
                    if(opt.index === q.a) score++;
                    setTimeout(() => {
                        currentQuestion++;
                        if(currentQuestion < questions.length) loadQuestion();
                        else showResults();
                    }, 800);
                };
                container.appendChild(btn);
            });
        }

        function showResults() {
            const percent = Math.round((score / questions.length) * 100);
            let mark = percent >= 85 ? 5 : percent >= 70 ? 4 : percent >= 50 ? 3 : 2;
            const userGroup = localStorage.getItem('user_group') || "Не указана";
        
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            // Заполнение экрана результатов
            document.getElementById('score-val').innerText = mark;
            document.getElementById('res-student-name').innerText = studentInfo;
            document.getElementById('score-text').innerText = `Вы набрали ${percent}% (${score}/${questions.length})`;
        
            // --- ОТПРАВКА В GOOGLE ТАБЛИЦУ ---
            const fURL = 'https://docs.google.com/forms/d/e/1FAIpQLSfiEZoHThkT4Za9B_LJ50TJTSYxuG0DklY9CSiMjq92vKANhA/viewform';
            
            const fData = new URLSearchParams();
            fData.append('entry.1458374118', studentInfo); 
            fData.append('entry.1320096689', userGroup);   
            fData.append('entry.1906150515', `${percent}% (${score}/${questions.length})`); 
            fData.append('entry.1688940307', mark);

            fetch(fURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: fData.toString()
            }).then(() => {
                console.log("Данные успешно отправлены!");
            }).catch(e => console.error("Ошибка при отправке:", e));
        }
    </script>
</body>
</html>
