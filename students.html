<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="navbar.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛏️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .main-centered {
            display: flex;
            flex-direction: column; 
            justify-content: center; 
            align-items: center;  
            min-height: 100vh; 
            background: #0a0a0a; 
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        .auth-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .privacy-link {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .privacy-link:hover {
            opacity: 1 !important;
            border-bottom-color: #ffd700;
        }
    </style>
</head>
<body class="main-centered">
    <div class="background-overlay"></div>

    <div class="glass-card fadeInUp">
        <h2 style="margin-bottom: 30px; color: #ffd700;">🔐 Авторизация</h2>
        
        <div class="auth-container">
            <input type="text" id="login" class="pass-input" placeholder="Логин (Группа)" style="width: 100%; box-sizing: border-box;">
            <input type="password" id="pass" class="pass-input" placeholder="Пароль" style="width: 100%; box-sizing: border-box;">
            
            <button onclick="login()" class="btn-primary" style="width: 100%; margin-top: 10px;">Войти</button>
        </div>
        <p id="error" style="color: #ff6b6b; display: none; margin-top: 15px;">Ошибка доступа</p>
    </div>
    <footer style="z-index: 10;">
        <p style="text-align: center; margin-top: 60px; font-size: 0.7rem; opacity: 0.2; letter-spacing: 2px; color: white;">
            © 2026 PERMYAKOV DESIGN | 
            <a href="privacy.html" class="privacy-link">ПОЛИТИКА КОНФИДЕНЦИАЛЬНОСТИ</a>
        </p>
    </footer>
    <script>
        function login() {
            const user = document.getElementById('login').value.trim();
            const pass = document.getElementById('pass').value.trim();         
            if (typeof USERS !== 'undefined' && USERS[user] && USERS[user].password === pass) {
                localStorage.setItem('user_group', user);
                localStorage.setItem('access_' + USERS[user].redirect, 'true');
                window.location.href = USERS[user].redirect;
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
