<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="navbar.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛏️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        /* Доп. подстраховка для центровки, если в style.css не хватает высоты */
        .main-centered {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* Чтобы поля гарантированно были в столбик и одной ширины */
        .auth-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }
    </style>
</head>
<body class="main-centered">
    <div class="background-overlay"></div>
    
    <div class="glass-card fadeInUp">
        <h2 style="margin-bottom: 30px;">🔐 Авторизация</h2>
        
        <div class="auth-container">
            <input type="text" id="login" class="pass-input" placeholder="Логин (Группа)" style="width: 100%; box-sizing: border-box;">
            <input type="password" id="pass" class="pass-input" placeholder="Пароль" style="width: 100%; box-sizing: border-box;">
            
            <button onclick="login()" class="btn-primary" style="width: 100%; margin-top: 10px;">Войти</button>
        </div>

        <p id="error" style="color: #ff6b6b; display: none; margin-top: 15px;">Ошибка доступа</p>
        
        <!-- Ссылка на политику конфиденциальности в футере карточки -->
        <p style="margin-top: 40px; font-size: 0.6rem; opacity: 0.3; letter-spacing: 1px;">
            <a href="privacy.html" style="color: inherit; text-decoration: none; text-transform: uppercase;">Политика конфиденциальности</a>
        </p>
    </div>

    <script>
        function login() {
            const user = document.getElementById('login').value.trim();
            const pass = document.getElementById('pass').value.trim();
            
            // Проверка наличия данных в USERS из config.js
            if (typeof USERS !== 'undefined' && USERS[user] && USERS[user].password === pass) {
                localStorage.setItem('user_group', user);
                localStorage.setItem('access_' + USERS[user].redirect, 'true');
                window.location.href = USERS[user].redirect;
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
