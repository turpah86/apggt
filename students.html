<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    
    <!-- 1. Сначала стили -->
    <link rel="stylesheet" href="style.css">
    
    <!-- 2. Библиотека Supabase (самая первая среди скриптов) -->
    <script src="supabase.js"></script>
    
    <!-- 3. Твой конфиг, который использует библиотеку -->
    <script src="config.js"></script>
    
    <!-- 4. Остальное -->
    <script src="navbar.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .main-centered {
            display: flex;
            flex-direction: column; 
            justify-content: center; 
            align-items: center;  
            min-height: 100vh; 
            background: #0a0a0a; 
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        .auth-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .privacy-link {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .privacy-link:hover {
            opacity: 1 !important;
            border-bottom-color: #ffd700;
        }
    </style>
</head>
<body class="main-centered">
    <div class="background-overlay"></div>

    <div class="glass-card fadeInUp">
        <h2 style="margin-bottom: 30px; color: #ffd700;">🔐 Авторизация</h2>
        
        <div class="auth-container">
            <input type="text" id="login" class="pass-input" placeholder="Логин (Группа)" style="width: 100%; box-sizing: border-box;">
            <input type="password" id="pass" class="pass-input" placeholder="Пароль" style="width: 100%; box-sizing: border-box;">
            
            <button onclick="handlelogin()" class="btn-primary" style="width: 100%; margin-top: 10px;">Войти</button>
        </div>
        <p id="error" style="color: #ff6b6b; display: none; margin-top: 15px;">Ошибка доступа</p>
    </div>
    <footer style="z-index: 10;">
        <p style="text-align: center; margin-top: 60px; font-size: 0.7rem; opacity: 0.2; letter-spacing: 2px; color: white;">
            © 2026 PERMYAKOV DESIGN | 
            <a href="privacy.html" class="privacy-link">ПОЛИТИКА КОНФИДЕНЦИАЛЬНОСТИ</a>
        </p>
    </footer>
    <script>  
        async function handlelogin() {
            const user = document.getElementById('login').value.trim();
            // Проверь, чтобы id в инпуте выше был именно "pass"
            const pass = document.getElementById('pass').value.trim();
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';
    
            // 1. Проверка обычных групп из config.js
            if (typeof USERS !== 'undefined' && USERS[user] && USERS[user].password === pass) {
                localStorage.setItem('user_group', user);
                window.location.href = USERS[user].redirect;
                return;
            }
    
            // 2. Проверка студентов РЕМ через Supabase
            try {
                // ЗАМЕНЯЕМ .single() на .maybeSingle() здесь!
                const { data: student, error } = await _supabase
                    .from('students')
                    .select('*')
                    .eq('login', user)
                    .eq('password', pass)
                    .maybeSingle(); 
        
                if (error) throw error;
    
                if (student) {
                    // Получаем настройки курса
                    const { data: config, error: configErr } = await _supabase
                        .from('course_config')
                        .select('*')
                        .eq('group_id', student.group_name)
                        .maybeSingle();
    
                    if (config) {
                        const now = new Date();
                        if (now < new Date(config.start_date)) {
                            alert("Курс еще не начался. Старт: " + new Date(config.start_date).toLocaleDateString());
                            return;
                        }
                        if (now > new Date(config.end_date)) {
                            alert("Время обучения закончилось.");
                            return;
                        }
                    }
    
                    // СОХРАНЯЕМ ДАННЫЕ (критично для открытия тем!)
                    localStorage.setItem('student_login', student.login);
                    localStorage.setItem('student_step', student.current_step);
                    localStorage.setItem('user_group', student.group_name);
                    
                    window.location.href = 'rem_course.html'; 
                } else {
                    // Если student === null (не найден)
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                errorEl.style.display = 'block';
                console.error("Ошибка авторизации:", e);
            }
        }
    </script>
</body>
</html>
