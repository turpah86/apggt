<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группа ОГР</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://googleapis.com" rel="stylesheet">
    
    <script>

        if (localStorage.getItem('access_ogr23.html') !== 'true') {
            window.location.href = 'students.html';
        }
    </script>

    <style>

        .btn-primary, .btn-secondary {
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .hint-text {
            display: block;
            margin-top: 8px;
            font-size: 0.75rem;
            opacity: 0.5;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <nav class="glass-nav">
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="logo-ggt.png" alt="Логотип ГГТ" class="nav-logo-img">
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="achievements.html">Достижения</a>
            <a href="index.html" onclick="localStorage.clear()" style="color: var(--gold);">Выйти</a>
        </div>
    </nav>

    <main class="main-centered" style="flex-direction: column; padding-top: 120px; padding-bottom: 40px;">
        <section class="glass-card fadeInUp" style="max-width: 600px; width: 90%;">
            <h2 class="group-title">📦 Группа ОГР</h2>
            
            <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 20px; border-radius: 15px; margin: 25px 0; text-align: center;">
                <p style="opacity: 0.5; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Дисциплина:</p>
                <p style="font-size: 1.1rem; font-weight: 700; color: var(--gold);">Технология открытых горных работ</p>
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">

                <div>
                    <a href="https://disk.yandex.ru/d/a3BaNEAyqeVHVw" class="btn-primary" target="_blank">
                        <span style="font-size: 1.2rem;">📂</span> 
                        <span>Учебные материалы</span>
                    </a>
                    <span class="hint-text" style="text-align: center;">Файлы откроются в новой вкладке Яндекс Диска</span>
                </div>
                
                <a href="quiz.html" class="btn-secondary" style="margin-left: 0;">
                    <span style="font-size: 1.2rem;">📝</span>
                    <span>Пройти тестирование</span>
                </a>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 20px; opacity: 0.3; font-size: 0.7rem;">
        Личный кабинет студента ГГТ © 2026
    </footer>

</body>
</html>
