<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛏️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группа ОГР</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://googleapis.com" rel="stylesheet">
    
    <script>

        if (localStorage.getItem('access_ogr23.html') !== 'true') {
            window.location.href = 'students.html';
        }
    </script>

    <style>

        .btn-primary, .btn-secondary {
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .hint-text {
            display: block;
            margin-top: 8px;
            font-size: 0.75rem;
            opacity: 0.5;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <nav class="glass-nav">
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="logo-ggt.png" alt="Логотип ГГТ" class="nav-logo-img">
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="achievements.html">Достижения</a>
            <a href="index.html" onclick="localStorage.clear()" style="color: var(--gold);">Выйти</a>
        </div>
    </nav>

    <main class="main-centered" style="flex-direction: column; padding-top: 120px;">
        <section class="glass-card" style="max-width: 420px; width: 90%; padding: 35px; border-radius: 24px;">
            
            <h2 class="group-title" style="text-align: center; margin-bottom: 25px; font-size: 1.4rem;">📦 Личный кабинет</h2>
    
            <div style="display: flex; flex-direction: column; gap: 18px;">
                
                <!-- Технология ОГР -->
                <a href="https://yandex.ru" class="btn-primary" target="_blank" 
                   style="width: 100%; height: 55px; font-size: 1rem; border-radius: 14px;">
                   ⛏️ Технология ОГР <span style="opacity: 0.5; font-size: 0.8rem; margin-left: auto;">↗</span>
                </a>
    
                <!-- Электроснабжение -->
                <a href="ТВОЯ_ССЫЛКА" class="btn-primary" target="_blank" 
                   style="width: 100%; height: 55px; font-size: 1rem; border-radius: 14px; background: rgba(0, 191, 255, 0.15); border: 1px solid #00bfff; color: #00bfff;">
                   ⚡ Электроснабжение ГП <span style="opacity: 0.5; font-size: 0.8rem; margin-left: auto;">↗</span>
                </a>
    
                <div style="margin: 10px 0; border-top: 1px solid rgba(255,255,255,0.05);"></div>
    
                <!-- Тестирование -->
                <a href="quiz.html" class="btn-secondary" 
                   style="width: 100%; height: 55px; border-radius: 14px; background: rgba(255,255,255,0.05); color: #fff;">
                   📝 Пройти тестирование
                </a>
                
            </div>
    
        </section>
    </main>

    <footer style="text-align: center; padding: 20px; opacity: 0.3; font-size: 0.7rem;">
        Личный кабинет студента группы ОГР © 2026
    </footer>

</body>
</html>
